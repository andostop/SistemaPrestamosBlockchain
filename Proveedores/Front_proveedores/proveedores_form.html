<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Registro de Proveedores</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    >

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(
                    circle at top left,
                    rgba(59, 130, 246, 0.35),
                    transparent 35%
                ),
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e3a8a,
                    #2563eb
                );
        }

        .form-wrapper {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
        }

        .main-card {
            margin-top: 30px;
            border: none;
            border-radius: 22px;
            overflow: hidden;
            background: #ffffff;
            box-shadow:
                0 25px 50px rgba(15, 23, 42, 0.3);
            animation: aparecer 0.5s ease;
        }

        .card-header {
            padding: 28px 35px;
            border: none;
            color: #ffffff;
            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #1d4ed8
                );
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-icon {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.7rem;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .card-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .card-header p {
            margin: 5px 0 0;
            color: #dbeafe;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 35px;
            background: #f8fafc;
        }

        .form-section-title {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 22px;
            color: #1e293b;
            font-size: 1rem;
            font-weight: 700;
        }

        .form-section-title i {
            color: #2563eb;
        }

        .form-label {
            margin-bottom: 7px;
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .campo-obligatorio {
            color: #dc2626;
        }

        .input-group-text {
            width: 46px;
            justify-content: center;
            color: #2563eb;
            background: #eff6ff;
            border: 1px solid #cbd5e1;
            border-right: none;
            border-radius: 11px 0 0 11px;
        }

        .form-control {
            min-height: 46px;
            color: #1e293b;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 0 11px 11px 0;
            box-shadow: none;
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                background-color 0.2s ease;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow:
                0 0 0 4px rgba(59, 130, 246, 0.13);
        }

        .input-group:focus-within .input-group-text {
            border-color: #3b82f6;
            color: #1d4ed8;
            background: #dbeafe;
        }

        .ayuda-campo {
            display: block;
            margin-top: 6px;
            color: #64748b;
            font-size: 0.78rem;
        }

        .acciones-formulario {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
        }

        .btn-formulario {
            min-width: 135px;
            min-height: 46px;
            border: none;
            border-radius: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                background-color 0.2s ease;
        }

        .btn-formulario:hover {
            transform: translateY(-2px);
        }

        .btn-guardar {
            color: #ffffff;
            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #1d4ed8
                );
            box-shadow:
                0 7px 16px rgba(37, 99, 235, 0.25);
        }

        .btn-guardar:hover {
            color: #ffffff;
            background:
                linear-gradient(
                    135deg,
                    #1d4ed8,
                    #1e40af
                );
            box-shadow:
                0 9px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-cancelar {
            color: #475569;
            background: #e2e8f0;
        }

        .btn-cancelar:hover {
            color: #1e293b;
            background: #cbd5e1;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-card {
                margin-top: 10px;
                border-radius: 16px;
            }

            .card-header {
                padding: 24px;
            }

            .card-body {
                padding: 24px;
            }

            .card-header h1 {
                font-size: 1.45rem;
            }

            .header-icon {
                width: 50px;
                height: 50px;
            }

            .acciones-formulario {
                flex-direction: column-reverse;
            }

            .btn-formulario {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <div class="form-wrapper">

            <div class="card main-card">

                <!-- Encabezado -->
                <div class="card-header">

                    <div class="header-content">

                        <div class="header-icon">
                            <i class="bi bi-building-add"></i>
                        </div>

                        <div>
                            <h1>Registrar proveedor</h1>

                            <p>
                                Complete los datos solicitados para agregar
                                un nuevo proveedor.
                            </p>
                        </div>

                    </div>

                </div>

                <!-- Formulario -->
                <div class="card-body">

                    <div class="form-section-title">
                        <i class="bi bi-person-vcard"></i>
                        Información del proveedor
                    </div>

                    <form
                        id="proveedorForm"
                        onsubmit="event.preventDefault(); guardarProveedores();"
                    >

                        <div class="row g-4">

                            <!-- Código -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="codigo"
                                    class="form-label"
                                >
                                    Código
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-upc-scan"></i>
                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="codigo"
                                        placeholder="Ejemplo: PRV001"
                                        autocomplete="off"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- RUC -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="ruc"
                                    class="form-label"
                                >
                                    RUC
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-card-text"></i>
                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="ruc"
                                        placeholder="Ingrese los 11 dígitos"
                                        maxlength="11"
                                        inputmode="numeric"
                                        autocomplete="off"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- Contacto -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="contacto"
                                    class="form-label"
                                >
                                    Contacto
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="contacto"
                                        placeholder="Nombre del contacto"
                                        autocomplete="name"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- Teléfono -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="telefono"
                                    class="form-label"
                                >
                                    Teléfono
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-telephone"></i>
                                    </span>

                                    <input
                                        type="tel"
                                        class="form-control"
                                        id="telefono"
                                        placeholder="Ejemplo: 987654321"
                                        maxlength="9"
                                        inputmode="numeric"
                                        autocomplete="tel"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- Correo -->
                            <div class="col-12">

                                <label
                                    for="correo"
                                    class="form-label"
                                >
                                    Correo electrónico
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input
                                        type="email"
                                        class="form-control"
                                        id="correo"
                                        placeholder="Ejemplo: proveedor@empresa.com"
                                        autocomplete="email"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- Banco -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="banco"
                                    class="form-label"
                                >
                                    Banco
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-bank"></i>
                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="banco"
                                        placeholder="Ejemplo: BCP"
                                        autocomplete="off"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- Cuenta -->
                            <div class="col-12 col-md-6">

                                <label
                                    for="cuenta"
                                    class="form-label"
                                >
                                    Número de cuenta
                                    <span class="campo-obligatorio">*</span>
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-credit-card"></i>
                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="cuenta"
                                        placeholder="Ingrese el número de cuenta"
                                        inputmode="numeric"
                                        autocomplete="off"
                                        required
                                    >

                                </div>

                                <small class="ayuda-campo">
                                    Ingrese el número sin espacios adicionales.
                                </small>

                            </div>

                        </div>

                        <!-- Botones -->
                        <div class="acciones-formulario">

                            <button
                                type="button"
                                class="btn btn-formulario btn-cancelar"
                                onclick="cancelarProveedores()"
                            >
                                <i class="bi bi-x-circle"></i>
                                Cancelar
                            </button>

                            <button
                                type="submit"
                                class="btn btn-formulario btn-guardar"
                            >
                                <i class="bi bi-floppy"></i>
                                Guardar proveedor
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="proveedores_form.js"></script>

</body>
</html>
