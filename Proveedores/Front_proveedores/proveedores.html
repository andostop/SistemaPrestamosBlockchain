<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proveedores</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!--Web3js-->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

    <style>
        body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    background-attachment: fixed;
    min-height:100vh;
    font-family: 'Segoe UI',sans-serif;
    }

.main-card{
    margin-top:40px;
    border:none;
    border-radius:20px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.card-header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding:25px;
    border:none;
}

.card-header h1{
    font-size:2rem;
    font-weight:700;
    margin-top:10px;
}

.card-header small{
    color:#dbeafe;
}

#cuentaConectada{
    color:#FFD54F !important;
    font-weight:bold;
    font-size:.9rem;
}

.card-body{
    padding:30px;
    background:#f8fafc;
}

.btn{
    border-radius:12px;
    padding:10px 20px;
    font-weight:600;
    transition:.3s;
}

.btn-primary{
    background:#2563eb;
    border:none;
}

.btn-primary:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.btn-success{
    background:#16a34a;
    border:none;
}

.btn-success:hover{
    background:#15803d;
    transform:translateY(-2px);
}

.table{
    border-radius:15px;
    overflow:hidden;
    background:white;
}

.table thead{
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
}

.table th{
    border:none;
    text-align:center;
    vertical-align:middle;
}

.table td{
    vertical-align:middle;
    text-align:center;
}

.table tbody tr{
    transition:.25s;
}

.table tbody tr:hover{
    background:#dbeafe;
    transform:scale(1.005);
}

.table-responsive{
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.acciones{
    display:flex;
    gap:15px;
}

.badge{
    padding:8px 12px;
    border-radius:20px;
    font-size:.85rem;
}

.card{
    animation:fadeIn .6s ease;
}

/* =====================================
   CONTENEDOR DE LA TABLA
===================================== */

.table-responsive {
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 8px 25px rgba(15, 23, 42, 0.08);
    overflow-x: auto;
    overflow-y: hidden;
}

/* =====================================
   TABLA DE PROVEEDORES
===================================== */

#proveedoresTable {
    width: 100%;
    min-width: 1200px;
    margin: 0;
    border-collapse: separate;
    border-spacing: 0;
    background: #ffffff;
}

#proveedoresTable thead {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
}

#proveedoresTable thead th {
    padding: 16px 12px;
    color: #ffffff;
    font-size: 0.78rem;
    font-weight: 700;
    text-align: center;
    vertical-align: middle;
    letter-spacing: 0.04em;
    white-space: nowrap;
    border: none;
}

#proveedoresTable thead th:first-child {
    border-top-left-radius: 14px;
}

#proveedoresTable thead th:last-child {
    border-top-right-radius: 14px;
}

#proveedoresTable tbody td {
    padding: 16px 12px;
    font-size: 0.88rem;
    color: #334155;
    text-align: center;
    vertical-align: middle;
    border-bottom: 1px solid #e2e8f0;
    background: #ffffff;
}

#proveedoresTable tbody tr:nth-child(even) td {
    background: #f8fafc;
}

#proveedoresTable tbody tr {
    transition: background-color 0.2s ease;
}

#proveedoresTable tbody tr:hover td {
    background: #eff6ff;
}

#proveedoresTable tbody tr:last-child td {
    border-bottom: none;
}

/* Evita que ciertos datos se corten mal */

#proveedoresTable td:nth-child(2),
#proveedoresTable td:nth-child(3),
#proveedoresTable td:nth-child(5),
#proveedoresTable td:nth-child(7),
#proveedoresTable td:nth-child(9),
#proveedoresTable td:nth-child(10) {
    white-space: nowrap;
}

/* Permite cortar correctamente correo y cuenta */

#proveedoresTable td:nth-child(6) {
    min-width: 190px;
    word-break: break-word;
}

#proveedoresTable td:nth-child(8) {
    min-width: 130px;
    word-break: break-word;
}

/* COLUMNA DE ACCIONES*/

.acciones-columna {
    min-width: 270px;
    width: 270px;
}

.acciones-tabla {
    display: grid;
    grid-template-columns: repeat(2, minmax(115px, 1fr));
    gap: 8px;
    width: 100%;
}

/* BOTONES DE ACCIÓN*/

.btn-accion {
    min-height: 40px;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.77rem;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background-color 0.2s ease;
}

.btn-accion:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(15, 23, 42, 0.15);
}

.btn-accion:active {
    transform: translateY(0);
}

.btn-accion i {
    font-size: 0.9rem;
}

/* Editar */

.btn-editar {
    color: #92400e;
    background: #fef3c7;
    border-color: #fcd34d;
}

.btn-editar:hover {
    color: #78350f;
    background: #fde68a;
}

/* Blockchain */

.btn-blockchain {
    color: #b91c1c;
    background: #fee2e2;
    border-color: #fca5a5;
}

.btn-blockchain:hover {
    color: #991b1b;
    background: #fecaca;
}

/* Validar */

.btn-validar {
    color: #0e7490;
    background: #cffafe;
    border-color: #67e8f9;
}

.btn-validar:hover {
    color: #155e75;
    background: #a5f3fc;
}

/* Mint NFT */

.btn-mint {
    color: #1d4ed8;
    background: #dbeafe;
    border-color: #93c5fd;
}

.btn-mint:hover {
    color: #1e40af;
    background: #bfdbfe;
}

/* Verificar NFT */

.btn-verificar {
    color: #047857;
    background: #d1fae5;
    border-color: #6ee7b7;
}

.btn-verificar:hover {
    color: #065f46;
    background: #a7f3d0;
}

/* PDF */

.btn-pdf {
    color: #9f1239;
    background: #ffe4e6;
    border-color: #fda4af;
}

.btn-pdf:hover {
    color: #881337;
    background: #fecdd3;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
    </style>
</head>

<body>

<div class="container py-4">

    <div class="card main-card">

        <div class="card-header text-center">
            <div class="card-header">
                <div class="text-start">
                    <small class="text-color-withe">Cuenta Conectada: </small>
                    <code id="cuentaConectada" class="text-danger">Conectando...</code>
                </div>

            </div>
            <h1>
                <i class="bi bi-truck"></i>
                Gestión de Proveedores
            </h1>
        </div>

        <div class="card-body">

            <!-- BOTONES -->
            <div class="acciones mb-4">

                <button type="button"
                        id="btnBuscar"
                        class="btn btn-primary"
                        onclick="buscarProveedores()">
                    <i class="bi bi-search"></i>
                    Buscar
                </button>

                <button type="button"
                        id="btnNuevo"
                        class="btn btn-success"
                        onclick="agregarProveedores()">
                    <i class="bi bi-plus-circle"></i>
                    Agregar Proveedor
                </button>

            </div>

            <!-- TABLA -->
            <div class="table-responsive">

                <table id="proveedoresTable" class="table table-striped table-hover align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>CÓDIGO</th>
                            <th>RUC</th>
                            <th>CONTACTO</th>
                            <th>TELÉFONO</th>
                            <th>CORREO</th>
                            <th>BANCO</th>
                            <th>CUENTA</th>
                            <th>FECHA</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>

                    <tbody id="proveedoresBody">
                        <!-- Datos dinámicos -->
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="proveedores.js"></script>

</body>
</html>
