<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pago</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
        }

        .card-header {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            border-radius: 16px 16px 0 0 !important;
        }

        .btn {
            border-radius: 10px;
        }
    </style>

</head>

<body>
    <div class="container mt-5">
        <div class="card w-75 mx-auto text-dark">
            <div class="card-header text-white text-center">
                <h2>
                    <i class="bi bi-cash-coin"></i>
                    Registrar Pago
                </h2>
                <p class="mb-0">
                    Sistema de Préstamos
                </p>
            </div>

            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">
                        CLIENTE ID
                    </label>
                    <input type="number" class="form-control" id="cliente">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        PRÉSTAMO ID
                    </label>
                    <input type="number" class="form-control" id="prestamo">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        MONTO PAGADO
                    </label>
                    <input type="number" class="form-control" id="monto">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        SALDO RESTANTE
                    </label>
                    <input type="number" class="form-control" id="saldo">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        FECHA
                    </label>
                    <input type="date" class="form-control" id="fecha">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        MÉTODO DE PAGO
                    </label>
                    <input type="text" class="form-control" id="metodo" placeholder="Efectivo, Yape, Tarjeta...">
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success" onclick="guardarPago()">
                        <i class="bi bi-save"></i>
                        GUARDAR
                    </button>

                    <button class="btn btn-secondary" onclick="cancelar()">
                        <i class="bi bi-x-circle"></i>
                        CANCELAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="pagos-form.js"></script>
</body>

</html>
