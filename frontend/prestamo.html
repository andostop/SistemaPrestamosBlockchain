<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    >
    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- sweetalert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="container mt-2">
    <div class="card">
        <div class="card-header">
            <h1 class="text-center">Prestamos</h1>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <button id="btnAgregar" class="btn btn-info btn-sm" onclick="buscarPrestamo()">BUSCAR</button>
                <button id="btnAgregar" class="btn btn-success btn-sm" onclick=agregarPrestamo()">NUEVO</button>
            </div>
            <div class="table-responsive">
                <table id="facturasTable" class="table table-bordered table-hover table-sm">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>CLIENTEID</th>
                            <th>MONTO</th>
                            <th>PLAZO</th>
                            <th>INTERES</th>
                            <th>ESTADO</th>
                        </tr>
                    </thead>
                    <tbody id="prestamosBody">

                    </tbody>
                </table>
            </div>
        </div>

    </div>
    
</body>
<script src="prestamo.js"></script>
</html>
